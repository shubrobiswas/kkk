# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Check and test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    # Run every step under bash so the bash-syntax steps below (e.g. the
    # `uv lock --check` guard) work on Windows runners, which default to pwsh.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          enable-cache: false
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}
      - name: Install just
        uses: extractions/setup-just@v3
      # `rustup` is available by default on GitHub runners
      - name: Install Rust
        run: rustup show
      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          just install
      - name: Check uv lockfile metadata
        run: |
          if ! uv lock --check; then echo "::error::`uv lock --check` has failed, ensure you have the latest `uv` version installed with `uv self update` and run `uv sync`"; exit 1; fi
      - name: Check format
        run: |
          just check-format
      - name: Check import order
        run: |
          just check-imports
      - name: Static type check
        run: |
          just check-types
      - name: Run unit tests
        run: |
          just test
