name: Deploy Docs

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync
      - name: Build docs
        run: uv run mkdocs build --config-file docs/reference/mkdocs.yml
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/reference/site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
