[package]
name = "opcua"
version = "0.1.0"
license = "Apache-2.0"
edition.workspace = true
rust-version.workspace = true

[dependencies]
# workspace
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["time"] }
itertools.workspace = true
open62541.workspace = true
open62541-sys.workspace = true
futures-util.workspace = true

# private
time = { version = "0.3.47", features = [
    "parsing",
    "serde",
    "serde-human-readable",
    "serde-well-known",
] }
zeroize = { version = "1.8", features = ["std"] }

[dev-dependencies]
opcua-test.workspace = true
instro-test-utils.workspace = true

[lints]
workspace = true
