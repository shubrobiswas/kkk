[project]
name = "instro-daq-ni"
version = "0.7.1"
description = "National Instruments (NI-DAQmx) DAQ drivers for instro"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10,<3.14"
dependencies = ["instro", "nidaqmx>=1.2.0"]

[project.urls]
Homepage = "https://github.com/nominal-io/instro"
Repository = "https://github.com/nominal-io/instro"
Issues = "https://github.com/nominal-io/instro/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
instro = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["instro"]
