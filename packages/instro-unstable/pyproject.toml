[project]
name = "instro-unstable"
version = "0.3.0"
description = "Unstable modules for instro (in-development features)"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10,<3.14"
dependencies = [
    "instro",
]

[project.optional-dependencies]
ethernetip = ["instro-ethernetip>=0.2.0,<0.3.0"]
all = ["instro-ethernetip>=0.2.0,<0.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
instro = { workspace = true }
instro-ethernetip = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["instro"]
