[project]
name = "instro-i2c-aardvark"
version = "0.2.1"
description = "Total Phase Aardvark I2C driver for instro"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10,<3.14"
dependencies = ["instro", "pyaardvark>=0.8.1"]

[project.urls]
Homepage = "https://github.com/nominal-io/instro"
Repository = "https://github.com/nominal-io/instro"
Issues = "https://github.com/nominal-io/instro/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
instro = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["instro"]
