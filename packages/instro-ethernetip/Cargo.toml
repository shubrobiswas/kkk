[package]
name = "instro-ethernetip"
version = "0.1.0"
license = "Apache-2.0"
edition.workspace = true
rust-version.workspace = true

[lib]
name = "_ethernetip"
crate-type = ["cdylib"]

[dependencies]
instro-ethernetip-rs = { path = "../instro-ethernetip-rs", features = ["blocking"] }
pyo3 = { version = "0.29.0", default-features = false, features = ["abi3-py310", "extension-module", "macros"] }
